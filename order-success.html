<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Спасибо за заказ — The Gabby</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Montserrat',sans-serif;
    background:#F9F9F9; color:#1A1A18;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:24px;
  }
  .card { max-width:440px; }
  h1 { font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:500; font-size:32px; margin-bottom:16px; color:#4F6FA0; }
  p { font-size:14px; line-height:1.7; color:#4A4A46; margin-bottom:8px; }
  #status { font-size:13px; color:#BD451E; margin-top:18px; }
  a { display:inline-block; margin-top:28px; color:#4F6FA0; text-decoration:none; font-size:13px; letter-spacing:.08em; text-transform:uppercase; }
  a:hover { text-decoration:underline; }
</style>
</head>
<body>
  <div class="card">
    <h1>Спасибо за заказ</h1>
    <p id="status">Проверяем статус оплаты…</p>
    <a href="/">вернуться в магазин</a>
  </div>

<script>
  // The order is actually confirmed server-side by the YooKassa webhook,
  // not by this page — this is just a friendly status check for the customer.
  const params = new URLSearchParams(window.location.search);
  const orderId = params.get('order');
  const statusEl = document.getElementById('status');

  if (!orderId) {
    statusEl.textContent = 'Если оплата прошла успешно, мы скоро свяжемся с вами.';
  } else {
    // Optional: poll a /api/order-status?order=ID endpoint here if you add one later.
    statusEl.textContent = 'Номер заказа: ' + orderId.slice(0, 8) + '. Мы свяжемся с вами для подтверждения.';
  }
</script>
</body>
</html>
